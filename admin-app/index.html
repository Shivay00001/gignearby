<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigNearby Admin Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../customer-app/styles.css"> <!-- Share core styles -->
    <link rel="stylesheet" href="../worker-app/styles.css"> <!-- Share stat cards -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-theme">

    <!-- Navbar -->
    <nav class="navbar" style="background: rgba(43, 10, 26, 0.85); border-bottom-color: var(--secondary)">
        <div class="nav-container">
            <a href="#" class="brand" onclick="app.navigate('dashboard')">
                <span class="logo-icon">👑</span> <span>GigNearby <small
                        style="font-size:0.5em;color:var(--secondary)">ADMIN</small></span>
            </a>
            <div class="nav-links">
                <a href="#dashboard" class="nav-link auth-only hidden" onclick="app.navigate('dashboard')">Overview</a>
                <a href="#bookings" class="nav-link auth-only hidden" onclick="app.navigate('bookings')">All
                    Bookings</a>
                <a href="#users" class="nav-link auth-only hidden" onclick="app.navigate('users')">Users</a>
                <a href="#settings" class="nav-link auth-only hidden" onclick="app.navigate('settings')">Settings</a>

                <div class="auth-buttons" id="auth-buttons">
                    <button class="btn btn-secondary" onclick="app.showLogin()">Admin Login</button>
                </div>
                <div class="user-menu hidden" id="user-menu">
                    <img src="" alt="Avatar" id="user-avatar" class="avatar" style="border-color: var(--secondary)">
                    <span id="user-name" class="user-name">Admin</span>
                    <button class="btn btn-outline btn-sm" onclick="app.logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="container">
        <!-- Rendered Pages go here -->
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content glass-panel modal-sm" style="border-color: var(--secondary)">
            <button class="close-btn" onclick="app.closeModal('auth-modal')">&times;</button>
            <div id="auth-modal-body"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/constants.js"></script>
    <script src="../shared/supabase-config.js"></script>
    <script src="../shared/auth.js"></script>
    <script src="app.js"></script>
</body>

</html>
